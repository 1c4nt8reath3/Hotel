<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rezerwacja pokoju - Zarezerwuj pokój</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <div class="container">
          <h1>Łódźtel</h1>
          <ul>
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="login.html">Login</a></li>
            <li><a href="register.html">Rejestracja</a></li>
            <li><a href="book.html">Pokoje</a></li>
          </ul>
        </div>
      </nav>
    </header>

    <main>
      <div class="container">
        <div class="form-container">
          <h2>Zarezerwuj pokój</h2>
          <form id="bookingForm" action="php/book.php" method="POST">
            <div class="form-group">
              <label for="room_type">Typ pokoju:</label>
              <select id="room_type" name="room_type" required>
                <option value="">Wybierz typ pokoju</option>
                <option value="Single">Pokój 1os. - 400pln/noc</option>
                <option value="Double">Pokój 2os. - 600pln/noc</option>
                <option value="Suite">Nie dla plebsów - 1000pln/noc</option>
                <option value="Family">Pokój rodzinny - 800pln/noc</option>
              </select>
            </div>
            <div class="form-group">
              <label for="check_in">Data zameldowania:</label>
              <input type="date" id="check_in" name="check_in" required />
            </div>
            <div class="form-group">
              <label for="check_out">Data wymeldowania:</label>
              <input type="date" id="check_out" name="check_out" required />
            </div>
            <button type="submit" class="btn">Zarezerwuj</button>
          </form>
          <p>
            Musisz być zalogowanym by dokonać rezerwacji.
            <a href="login.html">Zaloguj się tutaj</a>
          </p>
        </div>
      </div>
    </main>

    <footer>
      <div class="container">
        <p>&copy; 2023 Łódźtel. All rights reserved.</p>
      </div>
    </footer>

    <script src="js/script.js"></script>
  </body>
</html>
